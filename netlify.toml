[build]
  functions = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[headers]]
  for = "/representantes/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Cache-Control = "no-store, no-cache, must-revalidate"

# ── CRÍTICO: redirige el subdominio de prueba al dominio principal ──
# ANDRÉS: Para que esto funcione, agrega sofia.ajbusinessadvisory.com
# como dominio adicional en Netlify → Site Settings → Domain Management
[[redirects]]
  from = "https://sofia.ajbusinessadvisory.com/*"
  to   = "https://ajbusinessadvisory.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "/rep/cristian"
  to = "/representantes/cristian-becerra/"
  status = 301
